services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: miromem-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - miromem_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

volumes:
  miromem_qdrant_data:
    name: miromem_qdrant_data
