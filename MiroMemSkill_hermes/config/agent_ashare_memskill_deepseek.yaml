defaults:
  - benchmark: ashare-pred
  - memory: ashare
  - override hydra/job_logging: none
  - _self_

# A-share excess-return direction prediction + Memory/Skill loop.
# Same point-in-time discipline as the baseline (tool-ashare only, no web),
# plus the memskill MCP tools with an ISOLATED "ashare" memory namespace and
# memory_bank/skills_ashare seed skills.
# Ablation overrides:
#   memory.enabled=false            -> baseline tools only
#   memory.skill_enabled=false      -> memory only
#   memory.reflection_enabled=false -> no post-task writeback

main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  llm:
    provider_class: "GPTOpenAIClient"
    model_name: "${oc.env:DEEPSEEK_MODEL_NAME,deepseek-v4-pro}"
    async_client: true
    temperature: 0.3
    top_p: 0.95
    min_p: 0.0
    top_k: -1
    max_tokens: 16000
    openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
    openai_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"
    keep_tool_result: -1
    oai_tool_thinking: false

  tool_config:
    - tool-ashare
    - tool-memskill-ashare

  max_turns: 12
  # Keep at 10 (framework default): the orchestrator truncates executed calls
  # to this limit but keeps ALL tool_calls in the assistant message, so a
  # lower cap causes OpenAI-style 400 "insufficient tool messages" errors.
  max_tool_calls_per_turn: 10

  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"
  output_process:
    final_answer_extraction: false
    final_answer_llm_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"

  openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
  add_message_id: true
  keep_tool_result: -1
  chinese_context: "${oc.env:CHINESE_CONTEXT,true}"


sub_agents: null


output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"
