defaults:
  - benchmark: gaia-validation-text-only
  - override hydra/job_logging: none
  - _self_  # Allow defining variables at the top of this file


# GLM (glm-4.6) reproduction of the official text-only GAIA config.
# - Hierarchical: main orchestrator + agent-worker (same as official).
# - Native function calling prompts (BoxedDeepSeek / WorkerDeepSeek) instead of
#   the XML <use_mcp_tool> prompts, since GLM does native tool-calls cleanly.
# - hint_generation / final_answer_extraction are OFF: the official pipeline
#   calls OpenAI o3 / gpt-4.1 (hardcoded in summary_utils.py) which we do not have.
#   The model emits \boxed{...} directly and the scorer parses it.
main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  llm:
    provider_class: "GPTOpenAIClient"
    model_name: "${oc.env:GLM_MODEL_NAME,glm-4.6}"
    async_client: true
    temperature: 0.3
    top_p: 0.95
    min_p: 0.0
    top_k: -1
    max_tokens: 32000
    openai_api_key: "${oc.env:GLM_API_KEY,???}"
    openai_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
    keep_tool_result: -1
    oai_tool_thinking: false

  tool_config:
    - tool-reasoning-glm

  max_turns: -1
  max_tool_calls_per_turn: 10

  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
  output_process:
    final_answer_extraction: false
    final_answer_llm_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"

  openai_api_key: "${oc.env:GLM_API_KEY,???}"
  add_message_id: true
  keep_tool_result: -1
  chinese_context: "${oc.env:CHINESE_CONTEXT,false}"


sub_agents:
  agent-worker:
    prompt_class: SubAgentWorkerPromptDeepSeek
    llm:
      provider_class: "GPTOpenAIClient"
      model_name: "${oc.env:GLM_MODEL_NAME,glm-4.6}"
      async_client: true
      temperature: 0.3
      top_p: 0.95
      min_p: 0.0
      top_k: -1
      max_tokens: 32000
      openai_api_key: "${oc.env:GLM_API_KEY,???}"
      openai_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
      keep_tool_result: -1
      oai_tool_thinking: false

    tool_config:
      - tool-searching
      - tool-reading
      - tool-code

    max_turns: 40  # cap worker exploration to save serper/jina quota
    max_tool_calls_per_turn: 10


# Can define some top-level or default parameters here
output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"  # Points to where data is stored
