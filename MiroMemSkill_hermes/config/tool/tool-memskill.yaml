name: "tool-memskill"
tool_command: "python"
args:
  - "-m"
  - "src.tool.mcp_servers.memskill_mcp_server"
env:
  MEMSKILL_STORE_DIR: "${oc.env:MEMSKILL_STORE_DIR,memory_bank}"
  MEMSKILL_NAMESPACE: "${oc.env:MEMSKILL_NAMESPACE,default}"
  MEMSKILL_SKILLS_DIR: "${oc.env:MEMSKILL_SKILLS_DIR,memory_bank/skills}"
  MEMSKILL_EMBEDDING_ENABLED: "${oc.env:MEMSKILL_EMBEDDING_ENABLED,true}"
  GLM_API_KEY: "${oc.env:GLM_API_KEY,}"
  GLM_BASE_URL: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
