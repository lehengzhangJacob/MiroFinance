# Monthly open-universe (whole A-share market) trader benchmark, v2 prompt:
# neutral tool menu (no momentum-first suggestion), short-horizon reversal
# warning, and literal plain-text boxed format requirements.
defaults:
  - default
  - _self_

name: "ashare-trader-open"

data:
  data_dir: "${data_dir}/ashare_trader_open_v2"
  metadata_file: "standardized_data.jsonl"
  whitelist: []

execution:
  max_tasks: null
  max_concurrent: 1
  pass_at_k: 1
  task_order: monthly

# Free trader: no momentum anchor, no core-satellite canonicalization.
anchor_policy:
  enabled: false
  mode: legacy

openai_api_key: "${oc.env:OPENAI_API_KEY,unused-for-deterministic-trader-judge}"
