defaults:
  - benchmark: ashare-trader-open-v4
  - override hydra/job_logging: none
  - _self_

main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  generic_task_guidance_enabled: false
  llm:
    provider_class: "GPTOpenAIClient"
    model_name: "glm-5.2"
    async_client: true
    thinking_mode: enabled
    # Freeze a low-variance rule-based v4 before repeated evaluation.
    temperature: 0.3
    top_p: 1.0
    min_p: 0.0
    top_k: -1
    max_tokens: 32000
    openai_api_key: "${oc.env:GLM_API_KEY,???}"
    openai_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
    keep_tool_result: 10
    oai_tool_thinking: false

  tool_config:
    - tool-ashare-open

  max_turns: 30
  max_tool_calls_per_turn: 16
  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
  output_process:
    final_answer_extraction: false
    reuse_terminal_response: true
    final_answer_llm_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
  openai_api_key: "${oc.env:GLM_API_KEY,???}"
  add_message_id: true
  keep_tool_result: 10
  chinese_context: "${oc.env:CHINESE_CONTEXT,true}"

sub_agents: null
output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"
