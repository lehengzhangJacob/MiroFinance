# Memory & skill config for the A-share prediction benchmark.
# Isolated namespace + skills dir so the running FinSearchComp experiment
# (namespace "default", memory_bank/skills) is never contaminated.
enabled: true
store_dir: "memory_bank"
skills_dir: "memory_bank/skills_ashare"
namespace: "ashare"
inject_top_k: 3
skill_top_k: 2
skill_enabled: true
reflection_enabled: true
embedding_model: "embedding-3"
