defaults:
  - benchmark: finsearchcomp
  - memory: default
  - override hydra/job_logging: none
  - _self_

# FinSearchComp + Memory/Skill enhanced agent (GLM-4.6).
# Ablation overrides:
#   memory.enabled=false          -> baseline tools only
#   memory.skill_enabled=false    -> memory only
#   memory.reflection_enabled=false -> no post-task writeback

main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  llm:
    provider_class: "GPTOpenAIClient"
    model_name: "${oc.env:GLM_MODEL_NAME,glm-4.6}"
    async_client: true
    temperature: 0.3
    top_p: 0.95
    min_p: 0.0
    top_k: -1
    max_tokens: 32000
    openai_api_key: "${oc.env:GLM_API_KEY,???}"
    openai_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
    keep_tool_result: -1
    oai_tool_thinking: false

  tool_config:
    - tool-reasoning-glm
    - tool-memskill

  max_turns: 20
  max_tool_calls_per_turn: 10

  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
  output_process:
    final_answer_extraction: false
    final_answer_llm_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"

  openai_api_key: "${oc.env:GLM_API_KEY,???}"
  add_message_id: true
  keep_tool_result: -1
  chinese_context: "${oc.env:CHINESE_CONTEXT,true}"


sub_agents:
  agent-worker:
    prompt_class: SubAgentWorkerPromptDeepSeek
    llm:
      provider_class: "GPTOpenAIClient"
      model_name: "${oc.env:GLM_MODEL_NAME,glm-4.6}"
      async_client: true
      temperature: 0.3
      top_p: 0.95
      min_p: 0.0
      top_k: -1
      max_tokens: 32000
      openai_api_key: "${oc.env:GLM_API_KEY,???}"
      openai_base_url: "${oc.env:GLM_BASE_URL,https://open.bigmodel.cn/api/paas/v4}"
      keep_tool_result: -1
      oai_tool_thinking: false

    tool_config:
      - tool-searching
      - tool-reading
      - tool-code

    max_turns: 20
    max_tool_calls_per_turn: 10


output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"
