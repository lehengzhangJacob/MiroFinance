defaults:
  - benchmark: example_dataset
  - override hydra/job_logging: none
  - _self_  # Allow defining variables at the top of this file


main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  llm: 
    provider_class: "GPTOpenAIClient"
    model_name: "${oc.env:KIMI_MODEL_NAME,kimi-k2.6}"
    async_client: true
    temperature: 1.0  # kimi-k2.x are reasoning models: only temperature=1 allowed
    top_p: 1.0        # keep at 1.0 so it is not sent to the API
    min_p: 0.0
    top_k: -1
    max_tokens: 32000
    openai_api_key: "${oc.env:KIMI_API_KEY,???}"
    openai_base_url: "${oc.env:KIMI_BASE_URL,https://api.moonshot.cn/v1}"
    keep_tool_result: -1
    oai_tool_thinking: false
  
  tool_config: 
    - tool-reading

  max_turns: -1  # Maximum number of turns for main agent execution
  max_tool_calls_per_turn: 10  # Maximum number of tool calls per turn
  
  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:KIMI_BASE_URL,https://api.moonshot.cn/v1}"
  output_process:
    final_answer_extraction: false
    final_answer_llm_base_url: "${oc.env:KIMI_BASE_URL,https://api.moonshot.cn/v1}"

  openai_api_key: "${oc.env:KIMI_API_KEY,???}" # used for hint generation and final answer extraction
  add_message_id: true
  keep_tool_result: -1
  chinese_context: "${oc.env:CHINESE_CONTEXT,false}"


sub_agents: null


# Can define some top-level or default parameters here
output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"  # Points to where data is stored
