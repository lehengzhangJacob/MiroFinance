# Monthly 16-stock cross-sectional ranking benchmark (12 tasks).
defaults:
  - default
  - _self_

name: "ashare-rank"

data:
  data_dir: "${data_dir}/ashare_rank"
  metadata_file: "standardized_data.jsonl"
  whitelist: []

execution:
  max_tasks: null
  max_concurrent: 1
  pass_at_k: 1
  task_order: monthly

openai_api_key: "${oc.env:OPENAI_API_KEY,unused-for-deterministic-rank-judge}"
