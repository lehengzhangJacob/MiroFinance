# Memory & skill config for the A-share prediction benchmark.
# Isolated namespace + skills dir so the running FinSearchComp experiment
# (namespace "default", memory_bank/skills) is never contaminated.
enabled: true
backend: "mem0_qdrant"
embedding_dims: 2048
store_dir: "memory_bank"
skills_dir: "memory_bank/skills_ashare"
namespace: "ashare"
inject_top_k: 3
skill_top_k: 2
skill_enabled: true
reflection_enabled: true
embedding_model: "embedding-3"
# Ablation switch: false = load skills but do NOT inject retrieved memories
# (skill-only arm). memory.enabled=false remains the no-memory baseline.
inject_enabled: true
# Write-side near-duplicate filter (token-set Jaccard, CJK bigrams).
dedupe_threshold: 0.8
# Full skill body is injected only when match score >= this value.
# Under keyword scoring (embeddings off) 2.0 == at least one trigger hit.
skill_preview_min_score: 2.0
