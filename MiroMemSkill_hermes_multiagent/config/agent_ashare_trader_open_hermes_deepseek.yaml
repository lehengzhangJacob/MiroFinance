defaults:
  - benchmark: ashare-trader-open
  - memory: ashare_trader_hermes_skillonly
  - override hydra/job_logging: none
  - _self_

main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  generic_task_guidance_enabled: false
  llm:
    provider_class: "GPTOpenAIClient"
    model_name: "${oc.env:DEEPSEEK_MODEL_NAME,deepseek-chat}"
    async_client: true
    temperature: 0.3
    top_p: 0.95
    min_p: 0.0
    top_k: -1
    max_tokens: 32000
    openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
    openai_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"
    keep_tool_result: 6
    oai_tool_thinking: false

  tool_config:
    - tool-ashare-open

  max_turns: 24
  max_tool_calls_per_turn: 16
  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"
  output_process:
    final_answer_extraction: false
    reuse_terminal_response: true
    final_answer_llm_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"
  openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
  add_message_id: true
  keep_tool_result: 6
  chinese_context: "${oc.env:CHINESE_CONTEXT,true}"

sub_agents: null
output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"
