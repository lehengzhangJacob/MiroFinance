# A-share monthly excess-return direction prediction (72 tasks).
# Generated by scripts/ashare/gen_tasks.py; point-in-time data via tool-ashare.
defaults:
  - default
  - _self_

name: "ashare-pred"

data:
  data_dir: "${data_dir}/ashare_pred"
  metadata_file: "standardized_data.jsonl"
  whitelist: []

execution:
  max_tasks: null
  max_concurrent: 2
  pass_at_k: 1

openai_api_key: "${oc.env:OPENAI_API_KEY,???}"
