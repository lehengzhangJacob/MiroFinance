defaults:
  - benchmark: ashare-pred
  - override hydra/job_logging: none
  - _self_

# A-share excess-return direction prediction, baseline (no memory/skill).
# Kimi k2.6 primary (DeepSeek balance exhausted 2026-07-08).
# NOTE: kimi-k2.x are reasoning models: only temperature=1 allowed.
# Point-in-time discipline: ONLY tool-ashare is mounted (local Tushare cache
# hard-truncated at as_of); no web search, no sub-agents.
main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  llm:
    provider_class: "GPTOpenAIClient"
    model_name: "${oc.env:KIMI_MODEL_NAME,kimi-k2.6}"
    async_client: true
    temperature: 1.0
    top_p: 1.0
    min_p: 0.0
    top_k: -1
    max_tokens: 16000
    openai_api_key: "${oc.env:KIMI_API_KEY,???}"
    openai_base_url: "${oc.env:KIMI_BASE_URL,https://api.moonshot.cn/v1}"
    keep_tool_result: -1
    oai_tool_thinking: false

  tool_config:
    - tool-ashare

  max_turns: 12
  # Keep at 10 (framework default): the orchestrator truncates executed calls
  # to this limit but keeps ALL tool_calls in the assistant message, so a
  # lower cap causes OpenAI-style 400 "insufficient tool messages" errors.
  max_tool_calls_per_turn: 10

  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:KIMI_BASE_URL,https://api.moonshot.cn/v1}"
  output_process:
    final_answer_extraction: false
    final_answer_llm_base_url: "${oc.env:KIMI_BASE_URL,https://api.moonshot.cn/v1}"

  openai_api_key: "${oc.env:KIMI_API_KEY,???}"
  add_message_id: true
  keep_tool_result: -1
  chinese_context: "${oc.env:CHINESE_CONTEXT,true}"


sub_agents: null


output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"
