defaults:
  - benchmark: finsearchcomp
  - override hydra/job_logging: none
  - _self_  # Allow defining variables at the top of this file


# DeepSeek v4-pro version of the official FinSearchComp config.
# Primary model switched from GLM-4.6 (balance exhausted 2026-07-07) to
# deepseek-v4-pro (strongest DeepSeek; native function calling verified).
# Judge stays deepseek-chat (= v4-flash alias) via EVAL_LLM_* for consistency
# with already-judged tasks.
main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  llm:
    provider_class: "GPTOpenAIClient"
    model_name: "${oc.env:DEEPSEEK_MODEL_NAME,deepseek-v4-pro}"
    async_client: true
    temperature: 0.3
    top_p: 0.95
    min_p: 0.0
    top_k: -1
    max_tokens: 32000
    openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
    openai_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"
    keep_tool_result: -1
    oai_tool_thinking: false

  tool_config:
    - tool-reasoning-deepseek

  max_turns: 20  # align with official finsearchcomp config
  max_tool_calls_per_turn: 10

  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"
  output_process:
    final_answer_extraction: false
    final_answer_llm_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"

  openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
  add_message_id: true
  keep_tool_result: -1
  chinese_context: "${oc.env:CHINESE_CONTEXT,true}"


sub_agents:
  agent-worker:
    prompt_class: SubAgentWorkerPromptDeepSeek
    llm:
      provider_class: "GPTOpenAIClient"
      model_name: "${oc.env:DEEPSEEK_MODEL_NAME,deepseek-v4-pro}"
      async_client: true
      temperature: 0.3
      top_p: 0.95
      min_p: 0.0
      top_k: -1
      max_tokens: 32000
      openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
      openai_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com/v1}"
      keep_tool_result: -1
      oai_tool_thinking: false

    tool_config:
      - tool-searching
      - tool-reading
      - tool-code

    max_turns: 20  # align with official finsearchcomp config
    max_tool_calls_per_turn: 10


# Can define some top-level or default parameters here
output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"  # Points to where data is stored
